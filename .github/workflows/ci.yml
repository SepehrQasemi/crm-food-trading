name: CI

on:
  push:
    branches:
      - main
      - release/**
  pull_request:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-anon-key
      SUPABASE_SERVICE_ROLE_KEY: ci-service-role-key
      BREVO_API_KEY: ci-brevo-key
      CRON_SECRET: ci-cron-secret
      BI_API_KEY: ci-bi-key
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Ensure lightningcss native binary
        run: |
          LIGHTNING_VERSION=$(node -p "require('./web/node_modules/lightningcss/package.json').version")
          npm install --workspace web --no-save lightningcss-linux-x64-gnu@$LIGHTNING_VERSION
          OXIDE_VERSION=$(node -p "require('./web/node_modules/@tailwindcss/oxide/package.json').version")
          npm install --workspace web --no-save @tailwindcss/oxide-linux-x64-gnu@$OXIDE_VERSION

      - name: Run lint
        run: npm run lint

      - name: Run build
        run: npm run build

      - name: Run unit/component/api tests
        run: npm run test

      - name: Run coverage thresholds
        run: npm --workspace web run test:coverage

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: web/coverage
          if-no-files-found: ignore

  e2e-smoke:
    if: ${{ github.event_name == 'pull_request' && secrets.E2E_NEXT_PUBLIC_SUPABASE_URL != '' && secrets.E2E_NEXT_PUBLIC_SUPABASE_ANON_KEY != '' && secrets.E2E_SUPABASE_SERVICE_ROLE_KEY != '' }}
    needs: quality
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.E2E_NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.E2E_NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.E2E_SUPABASE_SERVICE_ROLE_KEY }}
      BREVO_API_KEY: ${{ secrets.E2E_BREVO_API_KEY }}
      CRON_SECRET: ${{ secrets.E2E_CRON_SECRET }}
      E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
      E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}
      E2E_MANAGER_EMAIL: ${{ secrets.E2E_MANAGER_EMAIL }}
      E2E_MANAGER_PASSWORD: ${{ secrets.E2E_MANAGER_PASSWORD }}
      E2E_COMMERCIAL_EMAIL: ${{ secrets.E2E_COMMERCIAL_EMAIL }}
      E2E_COMMERCIAL_PASSWORD: ${{ secrets.E2E_COMMERCIAL_PASSWORD }}
      E2E_STANDARD_EMAIL: ${{ secrets.E2E_STANDARD_EMAIL }}
      E2E_STANDARD_PASSWORD: ${{ secrets.E2E_STANDARD_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npm --workspace web run test:e2e:install

      - name: Create .env.local
        run: |
          cat <<EOF > web/.env.local
          NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
          NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
          SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
          BREVO_API_KEY=${BREVO_API_KEY}
          CRON_SECRET=${CRON_SECRET}
          EOF

      - name: Run E2E smoke
        run: npm --workspace web run test:e2e:smoke

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-smoke-report
          path: |
            web/playwright-report
            web/test-results
          if-no-files-found: ignore

  release-gate:
    if: ${{ github.event_name == 'push' && (startsWith(github.ref, 'refs/heads/main') || startsWith(github.ref, 'refs/heads/release/')) && secrets.E2E_NEXT_PUBLIC_SUPABASE_URL != '' && secrets.E2E_NEXT_PUBLIC_SUPABASE_ANON_KEY != '' && secrets.E2E_SUPABASE_SERVICE_ROLE_KEY != '' }}
    needs: quality
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.E2E_NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.E2E_NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.E2E_SUPABASE_SERVICE_ROLE_KEY }}
      BREVO_API_KEY: ${{ secrets.E2E_BREVO_API_KEY }}
      CRON_SECRET: ${{ secrets.E2E_CRON_SECRET }}
      E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
      E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}
      E2E_MANAGER_EMAIL: ${{ secrets.E2E_MANAGER_EMAIL }}
      E2E_MANAGER_PASSWORD: ${{ secrets.E2E_MANAGER_PASSWORD }}
      E2E_COMMERCIAL_EMAIL: ${{ secrets.E2E_COMMERCIAL_EMAIL }}
      E2E_COMMERCIAL_PASSWORD: ${{ secrets.E2E_COMMERCIAL_PASSWORD }}
      E2E_STANDARD_EMAIL: ${{ secrets.E2E_STANDARD_EMAIL }}
      E2E_STANDARD_PASSWORD: ${{ secrets.E2E_STANDARD_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npm --workspace web run test:e2e:install

      - name: Create .env.local
        run: |
          cat <<EOF > web/.env.local
          NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
          NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
          SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
          BREVO_API_KEY=${BREVO_API_KEY}
          CRON_SECRET=${CRON_SECRET}
          EOF

      - name: Run release gate
        run: npm run test:release

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-full-report
          path: |
            web/playwright-report
            web/test-results
          if-no-files-found: ignore
